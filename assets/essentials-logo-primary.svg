<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Essentials — Water and Parking Solutions">
  <defs>
    <style>
      .wordmark { font-family: "Cormorant Garamond", Georgia, serif; font-weight: 600; }
      .tagline  { font-family: "Inter", system-ui, sans-serif; font-weight: 500; }
    </style>
  </defs>

  <!-- warm ivory ground -->
  <rect width="640" height="360" fill="#faf6ef"/>

  <!-- top hairline flourish -->
  <line x1="220" y1="118" x2="420" y2="118" stroke="#a8894f" stroke-width="1.2" opacity="0.85"/>
  <circle cx="320" cy="118" r="3.4" fill="#a8894f"/>

  <!-- wordmark -->
  <text class="wordmark" x="320" y="205" text-anchor="middle" font-size="98" fill="#2a2b28" letter-spacing="1">Essentials</text>

  <!-- tagline -->
  <text class="tagline" x="320" y="252" text-anchor="middle" font-size="17" fill="#3a7772" letter-spacing="7">WATER · PARKING · SOLUTIONS</text>

  <!-- bottom hairline flourish -->
  <line x1="248" y1="280" x2="392" y2="280" stroke="#a8894f" stroke-width="1.2" opacity="0.85"/>
  <circle cx="320" cy="280" r="3.4" fill="#a8894f"/>
</svg>
